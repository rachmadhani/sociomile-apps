version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sociomile_backend
    ports:
      - "8080:8080"
    environment:
      - APP_ENV=development
      - PORT=8080
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=sociomile
      - DB_USER=root
      - DB_PASSWORD=rootpassword
      - REDIS_ADDR=redis:6379
      - REDIS_PASSWORD=
      - REDIS_DB=0
      - AUTO_MIGRATE=true
      - JWT_SECRET=your-super-secret-jwt-key
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - sociomile-network
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: sociomile_mysql
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword
      - MYSQL_DATABASE=sociomile
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sociomile-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: sociomile_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - sociomile-network
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:

networks:
  sociomile-network:
    driver: bridge
